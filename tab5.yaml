# ─── LVGL ─────────────────────────────────────────────────────────────────────

lvgl:
  buffer_size: 100%
  byte_order: little_endian
  displays:
    - device_display
  rotation: 270
  touchscreens:
    - device_touch

  style_definitions:
    - id: main_content
      bg_color: black
      text_color: 0xFFFFFF
      width: 100%
      height: 100%
      align: TOP_MID
      border_width: 0
      radius: 0

  theme:
    button:
      border_color: orange
      border_width: 3
      radius: 50
      bg_color: orange
      bg_opa: 20%

  pages:

    # ═══════════════════════════════════════════════════════════════════════════
    # PAGE 1 — ENERGY FLOW
    # Layout: 1280×720 landscape
    # Solar node centre:   640, 110  (x=540, y=40,  w=200, h=140)
    # Battery node centre: 180, 370  (x=80,  y=290, w=200, h=160)
    # Grid node centre:   1100, 360  (x=1000,y=290, w=200, h=140)
    # Home node centre:    640, 620  (x=540, y=550, w=200, h=140)
    # Lines connect node edge midpoints:
    #   Solar→Home:    640,180 → 640,550  (vertical)
    #   Solar→Battery: 540,110 → 180,290  slope=-0.5
    #   Battery→Home:  180,450 → 640,550  slope=0.217
    #   Grid→Home:    1100,430 → 640,550  slope=-0.261
    # ═══════════════════════════════════════════════════════════════════════════

    - id: energy_page
      on_swipe_left:
        then:
          - lvgl.page.show:
              id: dash_page
              animation: MOVE_LEFT
      widgets:
        - obj:
            styles: main_content
            scrollbar_mode: "off"
            widgets:
              # climate sensors
              - obj:
                  align: CENTER
                  x: -180
                  y: 40
                  # x: 1100
                  # y: 500
                  width: 160
                  height: 220
                  bg_color: black
                  border_width: 0
                  widgets:
                    - image:
                        id: weather_icon_img
                        src: img_cloudy
                        align: CENTER

                    - label:
                        id: light_level_lbl
                        align: TOP_MID
                        text: "_"
                        text_color: yellow
                        text_font: montserrat_32
                    - label:
                        id: out_temp_lbl
                        align: BOTTOM_MID
                        text_color: light_blue
                        text_font: montserrat_32                        
                        text: "_"
              # ── Node glow circles (rendered first — behind everything) ────
              # Each glow is 250px wide/tall, centred on its node, clamped 0-719
              - obj:
                  id: glow_solar
                  x: 515
                  y: 15
                  width: 250
                  height: 190
                  radius: 125
                  bg_color: yellow
                  bg_opa: 6%
                  border_width: 0

              - obj:
                  id: glow_battery
                  x: 55
                  y: 265
                  width: 250
                  height: 210
                  radius: 125
                  bg_color: 0x60A86A
                  bg_opa: 6%
                  border_width: 0

              - obj:
                  id: glow_grid
                  x: 975
                  y: 265
                  width: 250
                  height: 190
                  radius: 125
                  bg_color: 0xA9CBE9
                  bg_opa: 6%
                  border_width: 0

              - obj:
                  id: glow_home
                  x: 515
                  y: 525
                  width: 250
                  height: 190
                  radius: 125
                  bg_color: orange
                  bg_opa: 6%
                  border_width: 0

              # ── Connecting lines ──────────────────────────────────────────

              # Solar → Home (vertical x=640)
              - line:
                  id: line_solar_home
                  points:
                    - 640, 180
                    - 640, 550
                  line_color: yellow
                  line_width: 3
                  line_opa: 60%

              # Battery → Home (180,450 → 540,620  bottom-centre of battery → left-centre of home)
              - line:
                  id: line_batt_home
                  points:
                    - 180, 450
                    - 540, 620
                  line_color: 0x60A86A
                  line_width: 3
                  line_opa: 60%

              # Grid → Home (1100,430 → 740,620  bottom-centre of grid → right-centre of home)
              - line:
                  id: line_grid_home
                  points:
                    - 1100, 430
                    - 740, 620
                  line_color: 0xA9CBE9
                  line_width: 3
                  line_opa: 60%

              # Solar → Battery (540,110 → 180,290)
              - line:
                  id: line_solar_batt
                  points:
                    - 540, 110
                    - 180, 290
                  line_color: yellow
                  line_width: 3
                  line_opa: 60%

              # ── Animated dots ─────────────────────────────────────────────
              # Starting positions = line FROM endpoint − 9 (half dot size)

              # Solar → Home  (vertical, x fixed at 631, timer-driven)
              - obj:
                  id: dot_solar_home
                  width: 18
                  height: 18
                  radius: 9
                  bg_color: yellow
                  border_width: 0
                  x: 631
                  y: 171
                  hidden: true

              # Battery → Home (starts at 180,450, timer-driven)
              - obj:
                  id: dot_batt_home
                  width: 18
                  height: 18
                  radius: 9
                  bg_color: 0x60A86A
                  border_width: 0
                  x: 171
                  y: 441
                  hidden: true

              # Grid → Home (starts at 1100,430, timer-driven)
              - obj:
                  id: dot_grid_home
                  width: 18
                  height: 18
                  radius: 9
                  bg_color: 0xA9CBE9
                  border_width: 0
                  x: 1091
                  y: 421
                  hidden: true

              # Solar → Battery (starts at 540,110, lv_anim-driven)
              - obj:
                  id: dot_solar_batt
                  width: 18
                  height: 18
                  radius: 9
                  bg_color: yellow
                  border_width: 0
                  x: 531
                  y: 101
                  hidden: true

              # ── Node: Solar (top centre) ──────────────────────────────────
              - obj:
                  id: solar_node
                  x: 540
                  y: 40
                  width: 200
                  height: 140
                  bg_color: 0x1A1A00
                  border_color: yellow
                  border_width: 3
                  radius: 50
                  widgets:
                    - label:
                        text_font: icons_60
                        text_color: yellow
                        text: "\U000F1A73"
                        align: TOP_MID
                    - label:
                        id: ef_solar_watts
                        text_font: montserrat_32
                        text_color: yellow
                        text: "0w"
                        align: BOTTOM_MID

              # ── Today saving display ──────────────────────────────────────
              - obj:
                  id: saving_obj
                  bg_color: green
                  bg_opa: 20%
                  border_width: 3
                  pad_all: 3
                  border_color: green
                  radius: 50
                  width: 300
                  height: 150
                  x: 900
                  y: 40
                  widgets:
                    - label:
                        text_font: montserrat_32
                        text_color: green
                        text: "Saved Today"
                        align: TOP_MID
                        y: 20
                    - label:
                        id: today_saving_obj_lbl
                        text_font: montserrat_48
                        text_color: green
                        text: "_"
                        align: RIGHT_MID
                        x: -50
                        y: 20
                    - label:
                        text_font: icons_48
                        text_color: green
                        text: "\U000F01AE"
                        align: LEFT_MID
                        x: 50
                        y: 20

              # ── Node: Battery (middle left) ───────────────────────────────
              - obj:
                  id: battery_node
                  x: 80
                  y: 290
                  width: 200
                  height: 160
                  bg_color: 0x001A00
                  border_color: 0x60A86A
                  border_width: 3
                  radius: 50
                  widgets:
                    - label:
                        id: lbl_ef_batt_icon
                        text_font: icons_60
                        text_color: 0x60A86A
                        text: "\U000F0079"
                        align: CENTER
                    - label:
                        id: ef_batt_soc
                        text_font: montserrat_32
                        text_color: 0x60A86A
                        text: "-%"
                        align: TOP_MID
                        y: -5
                    - label:
                        id: ef_batt_watts
                        text_font: montserrat_32
                        text_color: 0x60A86A
                        text: "0w"
                        align: BOTTOM_MID

              # ── Node: Grid (middle right) ─────────────────────────────────
              - obj:
                  id: grid_node
                  x: 1000
                  y: 290
                  width: 200
                  height: 140
                  bg_color: 0x001020
                  border_color: 0xA9CBE9
                  border_width: 3
                  radius: 50
                  widgets:
                    - label:
                        id: ef_grid_icon
                        text_font: icons_60
                        text_color: 0xA9CBE9
                        text: "\U000F192D"
                        align: TOP_MID
                    - label:
                        id: ef_grid_watts
                        text_font: montserrat_32
                        text_color: 0xA9CBE9
                        text: "0w"
                        align: BOTTOM_MID

              # ── Node: Home (bottom centre) ────────────────────────────────
              - obj:
                  id: home_node
                  x: 540
                  y: 550
                  width: 200
                  height: 140
                  bg_color: 0x1A0A00
                  border_color: orange
                  border_width: 3
                  radius: 50
                  widgets:
                    - label:
                        text_font: icons_60
                        text_color: orange
                        text: "\U000F1903"
                        align: TOP_MID
                    - label:
                        id: ef_home_watts
                        text_font: montserrat_32
                        text_color: orange
                        text: "0w"
                        align: BOTTOM_MID

              # ── Time display ──────────────────────────────────────────────
