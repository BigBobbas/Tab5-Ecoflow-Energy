    entity_id: sensor.ef_60376_cell_temperature
    on_value:
      - lvgl.label.update:
          id: temperature_text_acp
          text:
            format: "%.0f°C"
            args: [ x ]

  # Combined battery: SOC, power flow
  - platform: homeassistant
    id: battery_soc_pct
    entity_id: sensor.ef_61821_battery_level
    on_value:
      - lvgl.label.update:
          id: lbl_battery_status_text_acp
          text:
            format: "%.0f%%"
            args: [ x ]
      - lvgl.label.update:
          id: ef_batt_soc
          text:
            format: "%.0f%%"
            args: [ x ]
      - lambda: |-
          auto color = x < 15 ? lv_palette_main(LV_PALETTE_RED) : lv_palette_main(LV_PALETTE_GREEN);
          lv_obj_set_style_text_color(id(lbl_battery_status_acp), color, 0);
          lv_obj_set_style_text_color(id(lbl_battery_status_text_acp), color, 0);
      - lvgl.label.update:
          id: lbl_battery_status_acp
          text: !lambda |-
            static char buf[10];
            const char* icon;
            if      (x == 100) icon = "\U000F0079";
            else if (x > 90)   icon = "\U000F0082";
            else if (x > 80)   icon = "\U000F0081";
            else if (x > 70)   icon = "\U000F0080";
            else if (x > 60)   icon = "\U000F007F";
            else if (x > 50)   icon = "\U000F007E";
            else if (x > 40)   icon = "\U000F007D";
            else if (x > 30)   icon = "\U000F007C";
            else if (x > 20)   icon = "\U000F007B";
            else if (x > 10)   icon = "\U000F007A";
            else if (x > 0)    icon = "\U000F008E";
            else               icon = "\U000F0091";
            snprintf(buf, sizeof(buf), "%s", icon);
            return buf;

  # Battery power flow
  # Positive = charging (solar→battery), negative = discharging (battery→home)
  # Line solar→batt: 540,180 → 280,290  slope=(290-180)/(280-540)=110/-260=-0.423
  # Line batt→home:  280,450 → 540,620  slope=(620-450)/(540-280)=170/260=0.654
  - platform: homeassistant
    id: battery_power_flow
    entity_id: sensor.ef_61821_battery_power
    on_value:
      - lvgl.label.update:
          id: batt_soc
          text:
            format: "%.0fw"
            args: [ x ]
      - lvgl.label.update:
          id: ef_batt_watts
          text:
            format: "%.0fw"
            args: [ x ]
      - lambda: |-
          auto color = x < 0 ? lv_palette_main(LV_PALETTE_RED) : lv_palette_main(LV_PALETTE_GREEN);
          lv_obj_set_style_text_color(id(batt_soc), color, 0);
          lv_obj_set_style_text_color(id(charge_icon_arrow), color, 0);
          lv_obj_set_style_text_color(id(ef_batt_watts), color, 0);
      - lvgl.label.update:
          id: charge_icon_arrow
          text: !lambda |-
            static char buf[10];
            snprintf(buf, sizeof(buf), "%s", x > 0 ? "\U000F0055" : "\U000F004E");
            return buf;
      - lambda: |-
          // Battery dot animation — fixed speed 1100ms
          static int last_dir_batt = 0;
          int dir = x > 10 ? 1 : (x < -10 ? -1 : 0);
          if (dir != last_dir_batt) {
            last_dir_batt = dir;
            static lv_anim_t a;
            lv_anim_init(&a);
            lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
            lv_anim_set_duration(&a, 1100);
            if (dir == 1) {
              // Charging: solar→battery  line 540,110 → 180,290  slope=0.5
              lv_obj_clear_flag(id(dot_solar_batt), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(dot_batt_home), LV_OBJ_FLAG_HIDDEN);
              lv_anim_set_var(&a, id(dot_solar_batt));
              lv_anim_set_exec_cb(&a, [](void* obj, int32_t v) {
                lv_obj_set_x((lv_obj_t*)obj, v - 9);
                lv_obj_set_y((lv_obj_t*)obj, 110 + (int)((540 - v) * 0.5f) - 9);
              });
              lv_anim_set_values(&a, 540, 180);
            } else if (dir == -1) {
              // Discharging: battery→home  line 180,450 → 640,550  slope=0.217
              lv_obj_clear_flag(id(dot_batt_home), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(dot_solar_batt), LV_OBJ_FLAG_HIDDEN);
              lv_anim_set_var(&a, id(dot_batt_home));
              lv_anim_set_exec_cb(&a, [](void* obj, int32_t v) {
                lv_obj_set_x((lv_obj_t*)obj, v - 9);
                lv_obj_set_y((lv_obj_t*)obj, 450 + (int)((v - 180) * 0.217f) - 9);
              });
              lv_anim_set_values(&a, 180, 640);
            } else {
              lv_obj_add_flag(id(dot_solar_batt), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(dot_batt_home), LV_OBJ_FLAG_HIDDEN);
            }
            lv_anim_start(&a);
          }
      - lambda: |-
          // Battery glow — only toggle on state change
          static lv_anim_t ag;
          static int last_active = -1;
          float watts = x < 0 ? -x : x;
          int active = (watts > 10) ? 1 : 0;
          if (active != last_active) {
            last_active = active;
            if (active) {
              lv_anim_init(&ag);
              lv_anim_set_var(&ag, id(glow_battery));
              lv_anim_set_exec_cb(&ag, [](void* obj, int32_t v) {
                lv_obj_set_style_bg_opa((lv_obj_t*)obj, v, 0);
              });
              lv_anim_set_values(&ag, 15, 60);
              lv_anim_set_duration(&ag, 1100);
              lv_anim_set_playback_duration(&ag, 1100);
              lv_anim_set_repeat_count(&ag, LV_ANIM_REPEAT_INFINITE);
              lv_anim_start(&ag);
            } else {
              lv_anim_del(id(glow_battery), NULL);
              lv_obj_set_style_bg_opa(id(glow_battery), 15, 0);
            }
          }

