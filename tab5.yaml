    ip_address:
      name: IP Address
      id: ip_addr
      entity_category: "diagnostic"
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.met_office_codsall
    on_value:
      - lambda: |-
                const lv_img_dsc_t* img =
                  x == "sunny"           ? id(img_sunny).get_lv_image_dsc()        :
                  x == "clear-night"     ? id(img_clear_night).get_lv_image_dsc()  :
                  x == "partlycloudy"    ? id(img_partly_cloudy).get_lv_image_dsc():
                  x == "cloudy"          ? id(img_cloudy).get_lv_image_dsc()       :
                  x == "overcast"        ? id(img_overcast).get_lv_image_dsc()     :
                  x == "rainy"           ? id(img_rainy).get_lv_image_dsc()        :
                  x == "drizzle"         ? id(img_drizzle).get_lv_image_dsc()      :
                  x == "pouring"         ? id(img_pouring).get_lv_image_dsc()      :
                  x == "lightning"       ? id(img_lightning).get_lv_image_dsc()    :
                  x == "lightning-rainy" ? id(img_pouring).get_lv_image_dsc()      :
                  x == "snowy"           ? id(img_snowy).get_lv_image_dsc()        :
                  x == "snowy-rainy"     ? id(img_sleet).get_lv_image_dsc()        :
                  x == "windy"           ? id(img_windy).get_lv_image_dsc()        :
                  x == "windy-variant"   ? id(img_windy).get_lv_image_dsc()        :
                  x == "hail"            ? id(img_hail).get_lv_image_dsc()         :
                  x == "fog"             ? id(img_fog).get_lv_image_dsc()          :
                                           id(img_cloudy).get_lv_image_dsc();
                lv_image_set_src(id(weather_icon_img), img);
# ─── SENSORS ─────────────────────────────────────────────────────────────────

sensor:
  # weather 
  - platform: homeassistant
    id: light_level
    entity_id: sensor.light_level
    on_value:
      - lvgl.label.update:
          id: light_level_lbl
          text:
            format: "%.0flx"
            args: [ x ]
  - platform: homeassistant
    id: outside_temp
    entity_id: sensor.garden_temp_shed
    on_value:
      - lvgl.label.update:
          id: out_temp_lbl
          text:
            format: "%.0f°C"
            args: [ x ]
  # Savings
  - platform: homeassistant
    id: today_saving
    entity_id: sensor.solar_saving_today
    on_value:
      - lvgl.label.update:
          id: today_saving_lbl
          text:
            format: "%.2f"
            args: [ x ]
      - lvgl.label.update:
          id: today_saving_obj_lbl
          text:
            format: "%.2f"
            args: [ x ]

  - platform: homeassistant
    id: week_saving
    entity_id: sensor.solar_saving_this_week
    on_value:
      - lvgl.label.update:
          id: week_saving_lbl
          text:
            format: "%.2f"
            args: [ x ]

  - platform: homeassistant
    id: month_saving
    entity_id: sensor.solar_saving_this_month
    on_value:
      - lvgl.label.update:
          id: month_saving_lbl
          text:
            format: "%.2f"
            args: [ x ]

  # Demand breakdown
  - platform: homeassistant
    id: total_ct
    entity_id: sensor.total_power
    on_value:
      - lvgl.label.update:
          id: ct_text_total
          text:
            format: "%.0fw"
            args: [ x ]
      - lvgl.label.update:
          id: ef_home_watts
          text:
            format: "%.0fw"
            args: [ x ]
      - lambda: |-
          // Home node glow — only restart if duration changed meaningfully
          static lv_anim_t ag;
          static int last_active = -1;
          int active = (x > 10) ? 1 : 0;
          if (active != last_active) {
            last_active = active;
            if (active) {
              lv_anim_init(&ag);
              lv_anim_set_var(&ag, id(glow_home));
              lv_anim_set_exec_cb(&ag, [](void* obj, int32_t v) {
                lv_obj_set_style_bg_opa((lv_obj_t*)obj, v, 0);
              });
              lv_anim_set_values(&ag, 15, 60);
              lv_anim_set_duration(&ag, 1100);
              lv_anim_set_playback_duration(&ag, 1100);
              lv_anim_set_repeat_count(&ag, LV_ANIM_REPEAT_INFINITE);
              lv_anim_start(&ag);
            } else {
              lv_anim_del(id(glow_home), NULL);
              lv_obj_set_style_bg_opa(id(glow_home), 15, 0);
            }
          }

  - platform: homeassistant
    id: kitch_demand_sens
    entity_id: sensor.shellyem3_483fdac3b357_phase_a_power
    on_value:
      - lvgl.label.update:
