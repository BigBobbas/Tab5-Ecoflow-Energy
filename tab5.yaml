esphome:
  name: tab5
  friendly_name: Tab5
  on_boot:
    priority: -100
    then:
      - lambda: id(backlight).turn_on().set_brightness(1.0).perform();
      - lambda: |-
          // Fixed speed dot timers — all run at constant 1100ms per traversal
          // Solar→home: vertical x=640, y=180→550 (370px)
          lv_timer_create([](lv_timer_t* t) {
            static int32_t y = 180;
            static uint32_t last = 0;
            uint32_t now = lv_tick_get();
            uint32_t elapsed = now - last;
            if (elapsed == 0) return;
            last = now;
            int step = (int)((float)elapsed / 1100.0f * 370.0f);
            if (step < 1) step = 1;
            y += step;
            if (y > 550) y = 180;
            lv_obj_set_pos(id(dot_solar_home), 631, y - 9);
          }, 16, NULL);

          // Battery→home: 180,450 → 540,620  slope=0.472  (360px x-range)
          lv_timer_create([](lv_timer_t* t) {
            static int32_t bx = 180;
            static uint32_t last = 0;
            uint32_t now = lv_tick_get();
            uint32_t elapsed = now - last;
            if (elapsed == 0) return;
            last = now;
            int step = (int)((float)elapsed / 1100.0f * 360.0f);
            if (step < 1) step = 1;
            bx += step;
            if (bx > 540) bx = 180;
            lv_obj_set_pos(id(dot_batt_home), bx - 9,
              450 + (int)((bx - 180) * 0.472f) - 9);
          }, 16, NULL);

          // Grid→home: 1100,430 → 740,620  slope=-0.528  (360px x-range)
          lv_timer_create([](lv_timer_t* t) {
            static int32_t gx = 1100;
            static uint32_t last = 0;
            uint32_t now = lv_tick_get();
            uint32_t elapsed = now - last;
            if (elapsed == 0) return;
            last = now;
            int step = (int)((float)elapsed / 1100.0f * 360.0f);
            if (step < 1) step = 1;
            gx -= step;
            if (gx < 740) gx = 1100;
            lv_obj_set_pos(id(dot_grid_home), gx - 9,
              430 + (int)((1100 - gx) * 0.528f) - 9);
          }, 16, NULL);

esp32:
  variant: esp32p4
  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG

psram:
  mode: hex
  speed: 200MHz

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.1.228

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
  - id: pi4ioe2
    address: 0x44

# ─── SWITCHES ────────────────────────────────────────────────────────────────

switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3

  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true

  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7

  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0

  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: interrupt_pin_touchscreen
    pin:
      inverted: true
      number: GPIO23
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
    restore_mode: ALWAYS_ON

# ─── SCRIPTS ─────────────────────────────────────────────────────────────────

script:
  - id: timeout
    then:
      - lambda: id(backlight).turn_on().set_brightness(1.0).perform();
      - delay: 180s
      - lambda: id(backlight).turn_on().set_brightness(0.2).perform();

# ─── BINARY SENSORS ──────────────────────────────────────────────────────────

binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7

# ─── SELECT ──────────────────────────────────────────────────────────────────

select:
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

  - platform: es8388
    dac_output:
      name: BOTH
    adc_input_mic:
      name: ADC Input Mic

# ─── TOUCHSCREEN ─────────────────────────────────────────────────────────────

touchscreen:
  - platform: gt911
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    calibration:
      x_min: 0
      y_max: 720
      y_min: 0
      x_max: 1280
    id: device_touch
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

# ─── DISPLAY ─────────────────────────────────────────────────────────────────

esp_ldo:
  - voltage: 2.5V
    channel: 3

display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5Stack-Tab5
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    id: device_display

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

# ─── AUDIO ───────────────────────────────────────────────────────────────────

i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

audio_dac:
  - platform: es8388
    id: es8388_dac

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

media_player:
  - platform: speaker
    name: None
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

# ─── TIME ────────────────────────────────────────────────────────────────────

time:
  - platform: sntp
    id: sntp_time
    servers:
      - ntp0.ntp-servers.net
      - ntp1.ntp-servers.net
      - ntp2.ntp-servers.net
    on_time_sync:
      - lvgl.label.update:
          id: time_lbl
          text: !lambda |-
            static char time_buf[16];
            auto now = id(sntp_time).now();
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return time_buf;
      - lvgl.label.update:
          id: date_lbl
          text: !lambda |-
            static char date_buf[24];
            auto now = id(sntp_time).now();
            int day = now.day_of_month;
            const char* suffix;
            if (day == 11 || day == 12 || day == 13) {
              suffix = "th";
            } else {
              switch (day % 10) {
                case 1:  suffix = "st"; break;
                case 2:  suffix = "nd"; break;
                case 3:  suffix = "rd"; break;
                default: suffix = "th"; break;
              }
            }
            static const char* const mon_names[] = {
              "January","February","March","April","May","June",
              "July","August","September","October","November","December"
            };
            snprintf(date_buf, sizeof(date_buf), "%d%s %s", day, suffix, mon_names[now.month - 1]);
            return date_buf;
      - lvgl.label.update:
          id: day_lbl
          text: !lambda |-
            static const char* const day_names[] = {
              "SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"
            };
            return day_names[id(sntp_time).now().day_of_week - 1];
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - lvgl.label.update:
              id: time_lbl
              text: !lambda |-
                static char time_buf[16];
                auto now = id(sntp_time).now();
                snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
                return time_buf;
          - lvgl.label.update:
              id: date_lbl
              text: !lambda |-
                static char date_buf[24];
                auto now = id(sntp_time).now();
                int day = now.day_of_month;
                const char* suffix;
                if (day == 11 || day == 12 || day == 13) {
                  suffix = "th";
                } else {
                  switch (day % 10) {
                    case 1:  suffix = "st"; break;
                    case 2:  suffix = "nd"; break;
                    case 3:  suffix = "rd"; break;
                    default: suffix = "th"; break;
                  }
                }
                static const char* const mon_names[] = {
                  "January","February","March","April","May","June",
                  "July","August","September","October","November","December"
                };
                snprintf(date_buf, sizeof(date_buf), "%d%s %s", day, suffix, mon_names[now.month - 1]);
                return date_buf;
          - lvgl.label.update:
              id: day_lbl
              text: !lambda |-
                static const char* const day_names[] = {
                  "SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"
                };
                return day_names[id(sntp_time).now().day_of_week - 1];

