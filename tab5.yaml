    entity_id: sensor.house_wled_psu_fridge_freezer_watts
    on_value:
      - lvgl.label.update:
          id: fridge_text_total
          text:
            format: "%.0fw"
            args: [ x ]

  # Cabinet temperature
  - platform: homeassistant
    id: cab_temp
    entity_id: sensor.solar_box_monitor_solar_cabinet_temp
    on_value:
      - lvgl.label.update:
          id: temperature_text_cab
          text:
            format: "%.0f°C"
