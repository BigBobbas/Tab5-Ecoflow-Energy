              # ── Connecting lines ──────────────────────────────────────────

              # Solar → Home (vertical, x=590)
              - line:
                  id: line_solar_home
                  points:
                    - 590, 170
                    - 590, 530
                  line_color: yellow
                  line_width: 3
                  line_opa: 60%

              # Battery → Home
              - line:
                  id: line_batt_home
                  points:
                    - 250, 420
                    - 490, 600
                  line_color: 0x60A86A
                  line_width: 3
                  line_opa: 60%

              # Grid → Home
              - line:
                  id: line_grid_home
                  points:
                    - 940, 410
                    - 690, 600
                  line_color: 0xA9CBE9
                  line_width: 3
                  line_opa: 60%

              # Solar → Battery
              - line:
                  id: line_solar_batt
                  points:
                    - 510, 155
                    - 245, 290
                  line_color: yellow
                  line_width: 3
                  line_opa: 60%

              # ── Animated dots ─────────────────────────────────────────────
              # Each dot starts at the line's FROM endpoint minus 9px (half dot size)
              # to centre it on the line.

              # Solar → Home dot (vertical line x=590, starts at top y=170)
              - obj:
                  id: dot_solar_home
                  width: 18
                  height: 18
                  radius: 9
                  bg_color: yellow
                  border_width: 0
                  x: 581
                  y: 161

